name: Staging billing cron

# Vercel Cron only runs on production deployments, so the scheduled billing job
# (/api/cron/billing) never fires on the staging preview deploy. This workflow
# pings the staging endpoint daily so staging behaves like production while we
# test. GitHub only runs `schedule` from the default branch, which is why this
# file lives on main (it touches no application code).

on:
  schedule:
    # 08:00 UTC daily — mirrors the production Vercel cron in vercel.json.
    - cron: "0 8 * * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ping:
    name: Trigger staging billing cron
    runs-on: ubuntu-latest
    steps:
      - name: Call /api/cron/billing on staging
        env:
          CRON_SECRET: ${{ secrets.STAGING_CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::STAGING_CRON_SECRET is not set in repo secrets"
            exit 1
          fi
          code=$(curl -sS -o response.json -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            https://staging.tagitlux.com/api/cron/billing)
          echo "HTTP $code"
          cat response.json || true
          echo ""
          if [ "$code" != "200" ]; then
            echo "::error::Staging billing cron returned HTTP $code"
            exit 1
          fi
